name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build CLI
        run: |
          $env:CGO_ENABLED="0"
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          go build -ldflags="-s -w" -o ikca-cli-windows-amd64.exe .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Desktop
        run: wails build -platform windows/amd64
        working-directory: desktop

      - name: Rename Desktop exe
        run: |
          Move-Item desktop/build/bin/iKCA.exe ikca-desktop-windows-amd64.exe

      - name: Generate SHA256
        run: |
          $hash1 = (Get-FileHash ikca-cli-windows-amd64.exe -Algorithm SHA256).Hash
          $hash2 = (Get-FileHash ikca-desktop-windows-amd64.exe -Algorithm SHA256).Hash
          "$hash1  ikca-cli-windows-amd64.exe`n$hash2  ikca-desktop-windows-amd64.exe" | Out-File -Encoding utf8 SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ikca-cli-windows-amd64.exe
            ikca-desktop-windows-amd64.exe
            SHA256SUMS.txt
          generate_release_notes: true
